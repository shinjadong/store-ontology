name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    name: Type Check & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check all packages
        run: |
          pnpm --filter @store-ontology/core run lint
          pnpm --filter @store-ontology/schema run lint
          pnpm --filter @store-ontology/validators run lint
          pnpm --filter @store-ontology/connector-nice run lint
          pnpm --filter @store-ontology/connector-nts run lint
          pnpm --filter @store-ontology/connector-onvif run lint
          pnpm --filter @store-ontology/connector-wave run lint

      - name: Run tests
        run: pnpm test
